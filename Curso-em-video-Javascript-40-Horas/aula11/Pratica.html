<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>País</title>
</head>
<body>
    país: <input type="text" name="txtpais" id="txtpais">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res"></div>
    <script>
        function verificar() {
            var txtp = document.getElementById('txtpais') // Seleciona o input
            var res = document.getElementById('res')      // Seleciona a div de resultado
            var pais = txtp.value                        // Pega o texto digitado
            
            if (pais == 'Brasil') {
                res.innerHTML = '<p>Você é <strong>Brasileiro!</strong></p>'
            } else {
                res.innerHTML = '<p>Você é <strong>Estrangeiro!</strong></p>'
            }
        }

    </script>
</body>
</html>
